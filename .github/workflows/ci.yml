name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Format
        run: |
          go fmt ./...
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Files not formatted. Run 'go fmt ./...' locally."
            git diff --name-only
            exit 1
          fi

      - name: Tidy
        run: |
          go mod tidy
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::go.mod/go.sum not tidy. Run 'go mod tidy' locally."
            git diff --name-only
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.10.1

      - name: Test
        run: go test -race -cover ./...

      - name: Build
        run: go build -o /dev/null ./cmd/seeql
