name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip on docs/chore
        id: skip
        env:
          HEAD_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title }}
        run: |
          if echo "$HEAD_MSG" | head -1 | grep -qiE '^(docs|chore):'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v5
        if: steps.skip.outputs.skip != 'true'
        with:
          go-version-file: go.mod

      - name: Format
        if: steps.skip.outputs.skip != 'true'
        run: |
          go fmt ./...
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Files not formatted. Run 'go fmt ./...' locally."
            git diff --name-only
            exit 1
          fi

      - name: Tidy
        if: steps.skip.outputs.skip != 'true'
        run: |
          go mod tidy
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::go.mod/go.sum not tidy. Run 'go mod tidy' locally."
            git diff --name-only
            exit 1
          fi

      - name: Vet
        if: steps.skip.outputs.skip != 'true'
        run: go vet ./...

      - name: Lint
        if: steps.skip.outputs.skip != 'true'
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.10.1

      - name: Test
        if: steps.skip.outputs.skip != 'true'
        run: go test -race -cover ./...

      - name: Build
        if: steps.skip.outputs.skip != 'true'
        run: go build -o /dev/null ./cmd/seeql
