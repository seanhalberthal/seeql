version: 2

project_name: seeql

before:
  hooks:
    - go mod tidy

builds:
  - id: seeql
    main: ./cmd/seeql
    binary: seeql
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: sadopc
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/sadopc/seeql"
    description: "A terminal SQL client for PostgreSQL, MySQL, and SQLite"
    license: "MIT"
    install: |
      bin.install "seeql"
    test: |
      system "#{bin}/seeql", "version"
